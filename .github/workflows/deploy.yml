# Build, push and deploy the application to Azure Container Apps.
#
# Required GitHub Actions secrets:
#   AZURE_CREDENTIALS    - Service principal JSON consumed by azure/login
#   ACR_NAME             - Azure Container Registry name (e.g. "myregistry")
#   ACR_LOGIN_SERVER     - ACR login server (e.g. "myregistry.azurecr.io")
#   ACR_USERNAME         - ACR username for docker/login-action
#   ACR_PASSWORD         - ACR password for docker/login-action
#   AZURE_RESOURCE_GROUP - Resource group of the existing Container App
#   CONTAINER_APP_NAME   - Name of the existing Container App
#   IMAGE_NAME           - Repository/image name within ACR (e.g. "techworkshop-app")
#   FOUNDRY_ENDPOINT     - Set on the Container App as env var FOUNDRY_ENDPOINT
#   gpt_endpoint         - Set on the Container App as env var gpt_endpoint
#   embedding_endpoint   - Set on the Container App as env var embedding_endpoint
#   phi_4_endpoint       - Set on the Container App as env var phi_4_endpoint

name: Build and deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Container App secrets and deploy new image
        uses: azure/cli@v2
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_ENDPOINT: ${{ secrets.gpt_endpoint }}
          EMBEDDING_ENDPOINT: ${{ secrets.embedding_endpoint }}
          PHI_4_ENDPOINT: ${{ secrets.phi_4_endpoint }}
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            # Store the four endpoint values as Container App secrets so they
            # can be referenced as env vars via secretref (avoids plaintext).
            az containerapp secret set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --secrets \
                foundry-endpoint="$FOUNDRY_ENDPOINT" \
                gpt-endpoint="$GPT_ENDPOINT" \
                embedding-endpoint="$EMBEDDING_ENDPOINT" \
                phi-4-endpoint="$PHI_4_ENDPOINT"

            # Update the Container App to the newly pushed image and set the
            # four required env vars from the secrets configured above. Other
            # existing env vars on the Container App are preserved.
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "$ACR_LOGIN_SERVER/$IMAGE_NAME:$GITHUB_SHA" \
              --set-env-vars \
                FOUNDRY_ENDPOINT=secretref:foundry-endpoint \
                gpt_endpoint=secretref:gpt-endpoint \
                embedding_endpoint=secretref:embedding-endpoint \
                phi_4_endpoint=secretref:phi-4-endpoint
