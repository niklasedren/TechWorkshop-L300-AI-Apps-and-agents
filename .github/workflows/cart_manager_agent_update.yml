name: Deploy Cart Manager Agent

on:
  push:
    paths:
      - 'src/prompts/CartManagerPrompt.txt'
      - 'src/infra/agents/cart-manager.json'
      - '.github/workflows/cart_manager_agent_update.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy cart-manager agent to Foundry
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          # Read the prompt file and escape it for JSON
          INSTRUCTIONS=$(python3 -c "
          import json, sys
          with open('src/prompts/CartManagerPrompt.txt', 'r') as f:
              print(json.dumps(f.read()))
          ")

          # Build the request body from the template, substituting variables
          jq --arg model "$GPT_DEPLOYMENT" \
             --argjson instructions "$INSTRUCTIONS" \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/cart-manager.json > /tmp/agent-payload.json

          # Create/update the agent version via Foundry REST API
          az rest --method POST \
            --url "${FOUNDRY_ENDPOINT}/agents/cart-manager/versions?api-version=2025-11-15-preview" \
            --headers "Content-Type=application/json" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json

          echo "Cart manager agent deployed successfully."
